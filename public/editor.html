<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#11141a" />
    <title>卡牌编辑器</title>
    <meta
      name="description"
      content="手动修改当前单关炉石风游戏的卡牌名称、数值、文本和效果。"
    />
    <link rel="stylesheet" href="/editor.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero card">
        <div>
          <p class="eyebrow">Card Editor</p>
          <h1>手动改卡牌</h1>
          <p class="lede">
            这里可以直接改卡牌的名字、费用、身材、条件机制和文本。上面的数值字段会自动同步文字，只有复杂效果才需要碰 JSON。保存后回到游戏点“重新开始”即可使用新卡牌。
          </p>
        </div>
        <div class="hero-actions">
          <a class="top-link" href="/">返回游戏</a>
          <a class="top-link" href="/editor/library">卡牌库与卡组</a>
          <a class="top-link" href="/agents">查看日志</a>
        </div>
      </header>

      <main class="layout">
        <aside class="card card-list-panel">
          <div class="panel-head">
            <div>
              <p class="section-label">卡牌列表</p>
              <h2>选择要修改的卡</h2>
            </div>
            <div class="toolbar-actions">
              <button id="new-spell-button" type="button" class="secondary-button">新建法术模板</button>
              <button id="new-minion-button" type="button" class="secondary-button">新建随从模板</button>
              <button id="load-questline-deck-button" type="button" class="secondary-button">载入当前黑眼任务术</button>
              <button id="reset-all-button" type="button" class="secondary-button">重置全部修改</button>
            </div>
          </div>
          <p class="deck-code-note">当前预设：黑眼任务术 · 17 种 · 30 张 · 狂野模式</p>
          <div id="card-list" class="card-list"></div>
        </aside>

        <section class="editor-stack">
          <section class="card editor-panel">
            <div class="panel-head">
              <div>
                <p class="section-label">编辑窗口</p>
                <h2 id="editor-title">选择一张卡</h2>
              </div>
              <div class="status-chip" id="editor-status">未保存</div>
            </div>

            <form id="card-form" class="editor-form">
              <!-- === 基础信息 === -->
              <label>
                <span>卡牌 ID</span>
                <input id="field-id" name="id" type="text" readonly />
              </label>
              <label>
                <span>名称</span>
                <input id="field-name" name="name" type="text" />
              </label>
              <label>
                <span>费用</span>
                <input id="field-cost" name="cost" type="number" min="0" max="20" />
              </label>
              <label>
                <span>类型</span>
                <select id="field-type" name="type">
                  <option value="spell">法术</option>
                  <option value="minion">随从</option>
                </select>
              </label>
              <label>
                <span>启用状态</span>
                <select id="field-enabled" name="enabled">
                  <option value="true">启用</option>
                  <option value="false">禁用</option>
                </select>
              </label>
              <label>
                <span>起始牌组数量</span>
                <input id="field-deck-count" name="deckCount" type="number" min="0" max="30" />
              </label>
              <label>
                <span>文本同步</span>
                <select id="field-auto-text" name="autoText">
                  <option value="true">自动同步</option>
                  <option value="false">手动编辑</option>
                </select>
              </label>

              <!-- === 随从专属字段（法术禁用） === -->
              <fieldset id="minion-fields" class="form-fieldset">
                <legend>随从属性</legend>
                <label>
                  <span>攻击</span>
                  <input id="field-attack" name="attack" type="number" min="0" max="30" />
                </label>
                <label>
                  <span>生命</span>
                  <input id="field-health" name="health" type="number" min="1" max="60" />
                </label>
                <label class="form-span">
                  <span>随从关键词</span>
                  <div class="keyword-checkboxes" id="keywords-container">
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="taunt" /> 嘲讽</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="rush" /> 突袭</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="charge" /> 冲锋</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="poisonous" /> 剧毒</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="divineShield" /> 圣盾</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="lifesteal" /> 吸血</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="windfury" /> 风怒</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="megaWindfury" /> 超级风怒</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="reborn" /> 复生</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="stealth" /> 潜行</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="elusive" /> 扰魔</label>
                    <label class="keyword-option"><input type="checkbox" name="keywords" value="immune" /> 免疫</label>
                  </div>
                </label>
              </fieldset>

              <!-- === 卡牌机制（手动选择） === -->
              <fieldset class="form-fieldset">
                <legend>触发机制（手牌条件）</legend>
                <div class="mechanic-checkboxes" id="mechanics-container">
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="quickdraw" /> 快枪 ⚡</label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="combo" /> 连击 🔗</label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="outcast" /> 流放 ↔</label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="finale" /> 压轴 🎯</label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="manathirst" /> 法力渴求 💎<input type="number" id="field-manathirst-threshold" name="manathirstThreshold" min="1" max="20" value="5" style="width:50px;margin-left:4px" /></label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="spellburst" /> 法术迸发 ✦</label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="frenzy" /> 暴怒 🔥</label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="honorableKill" /> 荣誉消灭 ⚔</label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="overheal" /> 过量治疗 💚</label>
                  <label class="mechanic-option"><input type="checkbox" name="mechanics" value="corrupt" /> 腐蚀 🖤</label>
                </div>
                <p class="form-hint" id="mechanic-type-hint" style="display:none;margin-top:4px;color:var(--gold-soft)"></p>
              </fieldset>

              <!-- === 自动派生机制（只读） === -->
              <fieldset class="form-fieldset">
                <legend>卡牌机制（从效果自动派生）</legend>
                <div id="derived-mechanics" class="derived-mechanics">
                  <span class="mechanic-badge" data-mechanic="battlecry" style="display:none">战吼</span>
                  <span class="mechanic-badge" data-mechanic="deathrattle" style="display:none">亡语</span>
                  <span class="mechanic-badge" data-mechanic="questline" style="display:none">任务线</span>
                  <span class="mechanic-badge" data-mechanic="tradeable" style="display:none">可交易</span>
                  <span class="mechanic-badge" data-mechanic="temporary" style="display:none">临时牌</span>
                  <span class="mechanic-badge" data-mechanic="discover" style="display:none">发现</span>
                  <span class="mechanic-badge" data-mechanic="lifesteal" style="display:none">吸血</span>
                  <span class="mechanic-badge" data-mechanic="questReward" style="display:none">任务奖励</span>
                </div>
              </fieldset>

              <!-- === 机制附效配置（每个机制独立） === -->
              <fieldset id="mechanic-bonus-fields" class="form-fieldset" style="display:none">
                <legend>机制附效（触发时额外执行）</legend>
                <div id="bonus-effects-container"></div>
              </fieldset>

              <!-- === 任务线（每阶段独立配置） === -->
              <fieldset id="questline-fields" class="form-fieldset">
                <legend>任务线（仅任务线卡牌需要）</legend>
                <label class="form-span">
                  <span>启用任务线</span>
                  <select id="field-questline-enabled" name="questlineEnabled">
                    <option value="false">否</option>
                    <option value="true">是</option>
                  </select>
                </label>
                <div id="quest-stages-container" class="form-span">
                  <!-- JS 动态渲染阶段 -->
                </div>
                <div class="effect-groups-actions">
                  <button id="add-quest-stage-button" type="button" class="secondary-button">＋ 添加阶段</button>
                </div>
              </fieldset>

              <!-- === 动态费用规则 === -->
              <fieldset class="form-fieldset">
                <legend>动态费用</legend>
                <label>
                  <span>动态费用规则</span>
                  <select id="field-cost-rule" name="costRule">
                    <option value="">固定费用</option>
                    <option value="missingHealth">每缺失1点生命，费用-1</option>
                    <option value="selfDamageThisGame">本局每自伤1点，费用-1</option>
                    <option value="healthChangedThisGame">本局在你的回合每次生命变化，费用-1</option>
                  </select>
                </label>
                <label>
                  <span>最低费用</span>
                  <input id="field-cost-minimum" name="costMinimum" type="number" min="0" max="20" />
                </label>
              </fieldset>

              <!-- === 效果组列表（核心：每个效果组自带触发器） === -->
              <div id="effect-groups-container">
                <!-- JS 动态渲染 -->
              </div>
              <div class="effect-groups-actions">
                <button id="add-effect-group-button" type="button" class="secondary-button">＋ 添加效果组</button>
              </div>

              <!-- === 高级 JSON === -->
              <label class="form-span">
                <span>额外效果 JSON（放无法用上面字段表达的高级效果）</span>
                <textarea id="field-effects" name="effects" rows="8"></textarea>
              </label>

              <!-- === 显示文本 === -->
              <label class="form-span">
                <span>显示文本（自动同步开启时会跟着上面的字段变化）</span>
                <textarea id="field-text" name="text" rows="3"></textarea>
              </label>
            </form>

            <div class="button-row">
              <button id="save-card-button" type="button" class="primary-button">保存这张卡</button>
              <button id="reset-card-button" type="button" class="secondary-button">重置这张卡</button>
              <button id="apply-all-button" type="button" class="secondary-button">保存全部到游戏</button>
            </div>
          </section>

          <section class="card preview-panel">
            <div class="panel-head">
              <div>
                <p class="section-label">即时预览</p>
                <h2>这张卡现在会怎么显示</h2>
              </div>
            </div>

            <div style="margin-bottom:8px">
              <label style="display:inline-flex;align-items:center;gap:6px;font-size:0.85rem">
                <select id="preview-state-toggle" style="width:auto">
                  <option value="inactive">条件未满足 (绿)</option>
                  <option value="active">条件已满足 (黄)</option>
                </select>
              </label>
            </div>
            <div id="preview-card" class="preview-card"></div>
            <pre id="preview-json" class="preview-json"></pre>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="/editor.js"></script>
  </body>
</html>
